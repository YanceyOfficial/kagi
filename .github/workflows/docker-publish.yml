name: Docker Publish

on:
  push:
    branches: [master]

concurrency:
  group: docker-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # Skip runs triggered by the version-bump commit from this workflow
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Bump patch version in apps/kagi/package.json ──────────────────────
      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' apps/kagi/package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          jq --arg v "$NEW_VERSION" '.version = $v' apps/kagi/package.json > tmp.json && mv tmp.json apps/kagi/package.json
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped version: $CURRENT → $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/kagi/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      # ── Docker build & push ───────────────────────────────────────────────
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/kagi/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            yanceyofficial/kagi:${{ steps.version.outputs.version }}
            yanceyofficial/kagi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Sync README to Docker Hub ─────────────────────────────────────────
      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: yanceyofficial/kagi
          readme-filepath: apps/kagi/README.md
