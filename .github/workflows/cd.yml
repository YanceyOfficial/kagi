name: CD

# Only runs after the CI workflow succeeds on master.
on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

# Never cancel an in-progress deploy — let it finish.
concurrency:
  group: cd-master
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run doesn't set sha automatically — pin to the commit
          # that triggered CI so we build exactly what was tested.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          # GitHub Actions cache keeps layer cache warm across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
